  <body>
    <p> Some can take a second to load, only press once unless you'll get a bunch of tabs</p>
    <button onclick="openlink('https://raw.githubusercontent.com/Mine11152/stuff/refs/heads/main/1.12.2.html');">1.12.2</button>
    <button onclick="openlink('https://raw.githubusercontent.com/Mine11152/stuff/refs/heads/main/1.8.html');">1.8</button>
    <script>
      async function openlink(url) {

        const response = await fetch(url);
        const html = await response.text();

        const newWin = window.open("about:blank", "_blank");
        newWin.document.open();
        newWin.document.write(html);
        newWin.document.close();
      }

    </script>
