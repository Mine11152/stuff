    <script>
      async function openlink(url) {
    const response = await fetch(url);
    const html = await response.text();

    const win = window.open("about:blank", "_blank");
    const doc = win.document;

    // Parse the HTML into a DOM
    const parser = new DOMParser();
    const parsed = parser.parseFromString(html, "text/html");

    // Remove all scripts from head/body before copying
    doc.head.innerHTML = parsed.head.innerHTML.replace(/<script[\s\S]*?<\/script>/gi, "");
    doc.body.innerHTML = parsed.body.innerHTML.replace(/<script[\s\S]*?<\/script>/gi, "");

    // Collect scripts in the order they appear in the original document
    const scripts = [...parsed.querySelectorAll("script")];

    for (const s of scripts) {
        const script = doc.createElement("script");

        if (s.src) {
            // Fetch external script content
            try {
                const res = await fetch(s.src);
                const js = await res.text();
                script.textContent = js;
            } catch (e) {
                console.error("Failed to fetch script:", s.src, e);
                continue;
            }
        } else {
            // Inline script
            script.textContent = s.textContent;
        }

        // Append inline script to preserve execution order
        doc.head.appendChild(script);
    }
}
